<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        body {
            background: rgb(230, 235, 250);
            margin:0;
            font-family: Helvetica, Arial, sans-serif;

        }

        form{
            background: white;
            text-align: center;
            width: 100%;
        }

        h1{
            font-family: Helvetica, Arial, sans-serif;
            color: #1877f2;
            font-size:50px;
            margin-bottom:10px;


        }

        p{
            font-family: Helvetica, Arial, sans-serif;
            margin-bottom:50px;
        
        }

        .p1{
            font-family: Helvetica, Arial, sans-serif;
            margin-bottom:50px;
            font-size:20px;

        
        }

        .submit1{
            background: #0866ff ;
            color: white;
            width: 100%;
            border-radius: 8px;
            border: none;
            height: 40px;
            font-size:20px;
        }

        .submit2{
            background: #42b72a ;
            color: white;
            border-radius: 8px;
            border: none;
            height: 35px;
        }

        .contenedorFormulario{
            display: block;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .contenedorTexto{
            display: block;
            gap: 15px;
            justify-content: flex;
            flex-wrap: wrap;
            background: none;
            padding: 20px;
            border-radius: 8px;

        }

        .contenedorPrincipal{
            display: flex;
            justify-content:center;
            align-items:center;
            gap:120px;
            margin-top: 12%;
        }
        
        .contenedorDerecho{
            display: block;
            
            text-align: center;

        }

        .contenedorIzquierdo{
            display: block;
            margin-bottom: 120px;

        }
        

        input[type="text"]{
            width: 100%;
            height: 40px;
            border-radius: 8px;
            border: 2px solid rgb(238, 238, 238);
            color:rgb(161, 156, 156);
            font-size:15px;
            
        }

        a{
            text-decoration: none;
            color: rgb(51, 157, 219);
        }

        
    </style>
</head>
<body>



<div class="contenedorPrincipal"> 

    <div class="contenedorIzquierdo">

        <div class="contenedorTexto">

        <h1>facebook</h1>

        <p class="p1">Facebook te ayuda a comunicarte y <br>
        compartir con las personas que forman <br>
         parte de tu vida.</p>


        </div> 

    </div>

  

 <div class="contenedorDerecho">

  <div class="contenedorFormulario">
    <form>

            <input class="input" type="text" value="Correo electrónico o número de teléfono"><br><br>
            <input type="text" value="Contraseña"><br><br>
            <input class="submit1" type="submit" value="Iniciar sesión"><br><br>
            <a href="">¿Olvidaste tu contraseña?</a><br><br>
            <hr>
            <input class="submit2" type="submit" value="Crear cuenta nueva">
    </form>

</div>
    <footer>
        <p> <strong>Crea una página</strong> para una celebridad, una marca o <br> un negocio.</p>    
    </footer>  

</div>



</div>  



</body>
</html>
